<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BJJ Logger</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --surface2: #1e2530;
  --border: #2a3444; --gold: #c9a84c; --gold-dim: #8a6e2e;
  --white: #e8eaf0; --muted: #6b7a8d; --danger: #e05c5c;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--white); font-family: 'Hiragino Sans','Noto Sans JP',sans-serif; min-height: 100vh; padding-bottom: 72px; font-size: 14px; }
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.header-title { font-size: 18px; font-weight: 700; letter-spacing: 0.05em; color: var(--gold); }
.header-sub { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; z-index: 100; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 4px 8px; cursor: pointer; color: var(--muted); gap: 3px; border: none; background: none; font-family: inherit; transition: color 0.15s; }
.nav-item.active { color: var(--gold); }
.nav-item svg { width: 22px; height: 22px; }
.nav-label { font-size: 10px; }
.page { display: none; padding: 16px; }
.page.active { display: block; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 11px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
input, select, textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--white); font-family: inherit; font-size: 14px; outline: none; -webkit-appearance: none; }
input:focus, select:focus, textarea:focus { border-color: var(--gold-dim); }
textarea { resize: vertical; min-height: 80px; }
select option { background: var(--surface2); }
.btn { border: none; border-radius: 8px; padding: 11px 18px; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; letter-spacing: 0.03em; }
.btn-primary { background: var(--gold); color: #0d1117; width: 100%; padding: 13px; font-size: 15px; }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 8px 14px; font-size: 12px; }
.btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 6px 12px; font-size: 12px; }
.btn-sm { padding: 7px 12px; font-size: 12px; }
.belt-badge { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
.belt-guard    { background: rgba(58,123,213,0.2); color: #6fa8f5; border: 1px solid rgba(58,123,213,0.4); }
.belt-pass     { background: rgba(123,58,213,0.2); color: #b98af5; border: 1px solid rgba(123,58,213,0.4); }
.belt-takedown { background: rgba(213,123,58,0.2); color: #f5b07a; border: 1px solid rgba(213,123,58,0.4); }
.belt-submission { background: rgba(213,58,58,0.2); color: #f58080; border: 1px solid rgba(213,58,58,0.4); }
.belt-escape   { background: rgba(58,184,123,0.2); color: #6fe0a8; border: 1px solid rgba(58,184,123,0.4); }
.belt-other    { background: rgba(107,122,141,0.2); color: #9aabb8; border: 1px solid rgba(107,122,141,0.4); }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: flex-end; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: 16px 16px 0 0; padding: 20px 16px 32px; width: 100%; max-height: 90vh; overflow-y: auto; border-top: 1px solid var(--border); }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 18px; color: var(--gold); }
.modal-actions { display: flex; gap: 10px; margin-top: 18px; }
.modal-actions .btn { flex: 1; }
.tech-select-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.tech-chip { padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: 12px; cursor: pointer; transition: all 0.15s; }
.tech-chip.selected { border-color: var(--gold-dim); background: rgba(201,168,76,0.15); color: var(--gold); }
.empty { text-align: center; padding: 48px 20px; color: var(--muted); }
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-text { font-size: 14px; line-height: 1.6; }
.stale-badge { font-size: 10px; background: rgba(224,92,92,0.15); color: #f58080; border: 1px solid rgba(224,92,92,0.3); border-radius: 4px; padding: 2px 6px; margin-left: 6px; }
.class-chip-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
.class-chip-row:last-child { border-bottom: none; }
.filter-bar { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 12px; scrollbar-width: none; }
.filter-bar::-webkit-scrollbar { display: none; }
.filter-chip { white-space: nowrap; padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: 12px; cursor: pointer; flex-shrink: 0; }
.filter-chip.active { border-color: var(--gold-dim); background: rgba(201,168,76,0.15); color: var(--gold); }
.log-date { font-size: 13px; font-weight: 700; }
.log-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
.log-techniques { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
.log-memo { font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.5; }
.tech-name { font-size: 15px; font-weight: 600; }
.section-title { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; margin-top: 4px; }
.duration-btn { flex: 1; font-size: 15px; font-weight: 700; transition: all 0.15s; }
.duration-btn.selected { border-color: var(--gold-dim) !important; background: rgba(201,168,76,0.15) !important; color: var(--gold) !important; }
.video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 8px; margin-top: 10px; background: #000; }
.video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">BJJ LOGGER</div>
    <div class="header-sub" id="header-sub">練習記録</div>
  </div>
  <button class="btn btn-ghost btn-sm" id="add-btn">+ 記録</button>
</div>

<div class="page active" id="page-log">
  <p class="section-title">練習ログ</p>
  <div id="log-list"></div>
</div>

<div class="page" id="page-tech">
  <p class="section-title">技ライブラリ</p>
  <div class="filter-bar" id="tech-filter-bar"></div>
  <div id="tech-list"></div>
</div>

<div class="page" id="page-dash">
  <p class="section-title">レポート</p>

  <!-- Stats grid -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
    <div class="card" style="text-align:center;"><div class="form-label">トータル練習時間</div><div id="stat-total-hours" style="font-size:26px;font-weight:800;color:var(--gold);">0<span style="font-size:12px;color:var(--muted);"> h</span></div></div>
    <div class="card" style="text-align:center;"><div class="form-label">トータル練習回数</div><div id="stat-total-count" style="font-size:26px;font-weight:800;color:var(--gold);">0<span style="font-size:12px;color:var(--muted);"> 回</span></div></div>
    <div class="card" style="text-align:center;"><div class="form-label">今月の練習時間</div><div id="stat-month-hours" style="font-size:26px;font-weight:800;">0<span style="font-size:12px;color:var(--muted);"> h</span></div></div>
    <div class="card" style="text-align:center;"><div class="form-label">今週の練習時間</div><div id="stat-week-hours" style="font-size:26px;font-weight:800;">0<span style="font-size:12px;color:var(--muted);"> h</span></div></div>
    <div class="card" style="text-align:center;"><div class="form-label">習得技数</div><div id="stat-tech-count" style="font-size:26px;font-weight:800;">0<span style="font-size:12px;color:var(--muted);"> 技</span></div></div>
    <div class="card" style="text-align:center;"><div class="form-label">練習済み技数</div><div id="stat-practiced-count" style="font-size:26px;font-weight:800;">0<span style="font-size:12px;color:var(--muted);"> 技</span></div></div>
  </div>

  <!-- Growth insights -->
  <div class="card" style="margin-bottom:10px;" id="growth-insights"></div>

  <!-- Monthly chart -->
  <div class="card" style="margin-bottom:10px;"><div class="form-label" style="margin-bottom:12px;">月別練習回数（過去6ヶ月）</div><div id="chart-monthly"></div></div>

  <!-- Cumulative hours chart -->
  <div class="card" style="margin-bottom:10px;"><div class="form-label" style="margin-bottom:12px;">累計練習時間の推移</div><div id="chart-cumulative"></div></div>

  <!-- Category breakdown -->
  <div class="card" style="margin-bottom:10px;"><div class="form-label" style="margin-bottom:12px;">習った技の種類</div><div id="stat-categories"></div></div>

  <!-- Top techniques -->
  <div class="card" style="margin-bottom:10px;"><div class="form-label" style="margin-bottom:12px;">最も練習した技 TOP5</div><div id="stat-top-techs"></div></div>

  <!-- Class breakdown -->
  <div class="card" style="margin-bottom:10px;"><div class="form-label" style="margin-bottom:12px;">クラス別練習時間</div><div id="stat-classes"></div></div>

  <!-- AI Growth Summary -->
  <div class="card" style="margin-bottom:10px;">
    <div class="form-label" style="margin-bottom:10px;">AI成長分析</div>
    <div id="ai-growth-result" style="display:none;font-size:13px;line-height:1.7;color:var(--white);margin-bottom:12px;"></div>
    <button type="button" class="btn btn-primary" id="ai-growth-btn">🤖 AIに成長傾向を分析してもらう</button>
  </div>
</div>

<div class="page" id="page-master">
  <p class="section-title">クラス管理</p>
  <div class="card">
    <div id="class-list"></div>
    <div style="display:flex;gap:8px;margin-top:14px;">
      <input id="new-class-input" placeholder="クラス名を入力" style="flex:1;">
      <button class="btn btn-ghost btn-sm" id="add-class-btn">追加</button>
    </div>
  </div>
  <p class="section-title" style="margin-top:20px;">技カテゴリ</p>
  <div class="card">
    <div style="display:flex;flex-wrap:wrap;gap:6px;">
      <span class="belt-badge belt-guard">ガード</span>
      <span class="belt-badge belt-pass">パス</span>
      <span class="belt-badge belt-takedown">テイクダウン</span>
      <span class="belt-badge belt-submission">サブミッション</span>
      <span class="belt-badge belt-escape">エスケープ</span>
      <span class="belt-badge belt-other">その他</span>
    </div>
  </div>
</div>

<!-- Chat Page -->
<div class="page" id="page-chat" style="padding:0;display:none;flex-direction:column;height:calc(100vh - 120px);">
  <div style="padding:10px 16px 0;flex-shrink:0;">
    <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none;" id="chat-chips"></div>
  </div>
  <div style="flex:1;overflow-y:auto;padding:8px 16px;display:flex;flex-direction:column;gap:12px;" id="chat-area">
    <div id="chat-empty" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px 24px;color:var(--muted);gap:12px;">
      <div style="font-size:44px;opacity:0.6;">🥋</div>
      <div style="font-size:16px;font-weight:700;color:var(--white);">何でも聞いてください</div>
      <div style="font-size:13px;line-height:1.7;">技の掛け方・ポジション・対処法など<br>BJJに関することなら何でも答えます</div>
    </div>
  </div>
  <div style="background:var(--surface);border-top:1px solid var(--border);padding:10px 12px;display:flex;gap:8px;align-items:flex-end;flex-shrink:0;">
    <div style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:20px;display:flex;align-items:flex-end;padding:8px 14px;" id="chat-input-wrap">
      <textarea id="chat-input" rows="1" placeholder="例：三角絞めの掛け方を教えて" style="flex:1;background:none;border:none;outline:none;color:var(--white);font-family:inherit;font-size:14px;resize:none;max-height:120px;line-height:1.5;scrollbar-width:none;"></textarea>
    </div>
    <button id="chat-send" style="width:38px;height:38px;border-radius:50%;background:var(--gold);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#0d1117"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<nav class="bottom-nav">
  <button class="nav-item active" id="nav-log">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span class="nav-label">ログ</span>
  </button>
  <button class="nav-item" id="nav-tech">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    <span class="nav-label">技</span>
  </button>
  <button class="nav-item" id="nav-dash">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    <span class="nav-label">レポート</span>
  </button>
  <button class="nav-item" id="nav-chat">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    <span class="nav-label">チャット</span>
  </button>
  <button class="nav-item" id="nav-master">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    <span class="nav-label">設定</span>
  </button>
</nav>

<!-- Add Log Modal -->
<div class="modal-overlay" id="modal-log">
  <div class="modal">
    <div class="modal-title">練習ログを追加</div>
    <div class="form-group"><label class="form-label">日付</label><input type="date" id="log-date"></div>
    <div class="form-group"><label class="form-label">クラス</label><select id="log-class"><option value="">クラスを選択</option></select></div>
    <div class="form-group">
      <label class="form-label">練習時間</label>
      <div style="display:flex;gap:10px;">
        <button type="button" class="btn btn-ghost duration-btn" id="dur-45">45分</button>
        <button type="button" class="btn btn-ghost duration-btn" id="dur-90">90分</button>
      </div>
    </div>
    <div class="form-group"><label class="form-label">習った技</label><div class="tech-select-grid" id="log-tech-chips"></div></div>
    <div class="form-group"><label class="form-label">スパーリング（任意）</label><input type="text" id="log-sparring" placeholder="例：3本、タップアウト1回"></div>
    <div class="form-group"><label class="form-label">メモ</label><textarea id="log-memo" placeholder="気づいたこと、コーチのフィードバックなど"></textarea></div>
    <div class="modal-actions">
      <button type="button" class="btn btn-ghost" id="cancel-log-btn">キャンセル</button>
      <button type="button" class="btn btn-primary" id="save-log-btn">保存する</button>
    </div>
  </div>
</div>

<!-- Add Tech Modal -->
<div class="modal-overlay" id="modal-tech">
  <div class="modal">
    <div class="modal-title">技を追加</div>
    <div class="form-group">
      <label class="form-label">技名</label>
      <input type="text" id="tech-name" placeholder="例：クローズドガード" autocomplete="off">
      <div id="tech-suggest" style="display:none;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-top:4px;max-height:180px;overflow-y:auto;"></div>
    </div>
    <div class="form-group">
      <label class="form-label">カテゴリ</label>
      <select id="tech-category">
        <option value="guard">ガード</option>
        <option value="pass">パス</option>
        <option value="takedown">テイクダウン</option>
        <option value="submission">サブミッション</option>
        <option value="escape">エスケープ</option>
        <option value="other">その他</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">YouTube URL（任意）</label><input type="url" id="tech-video" placeholder="https://www.youtube.com/watch?v=..."></div>
    <div class="form-group"><label class="form-label">メモ</label><textarea id="tech-memo" placeholder="コツ・注意点など"></textarea></div>
    <div class="modal-actions">
      <button type="button" class="btn btn-ghost" id="cancel-tech-btn">キャンセル</button>
      <button type="button" class="btn btn-primary" id="save-tech-btn">保存する</button>
    </div>
  </div>
</div>

<!-- View Log Modal -->
<div class="modal-overlay" id="modal-view-log">
  <div class="modal" id="view-log-content"></div>
</div>

<!-- View Tech Modal -->
<div class="modal-overlay" id="modal-view-tech">
  <div class="modal" id="view-tech-content"></div>
</div>

<script>
const CATEGORIES = {
  guard:      { label: 'ガード',        cls: 'belt-guard' },
  pass:       { label: 'パス',          cls: 'belt-pass' },
  takedown:   { label: 'テイクダウン',  cls: 'belt-takedown' },
  submission: { label: 'サブミッション',cls: 'belt-submission' },
  escape:     { label: 'エスケープ',    cls: 'belt-escape' },
  other:      { label: 'その他',        cls: 'belt-other' }
};

let state = { logs: [], techniques: [], classes: ['White Belt', 'All Belt', 'Basic'] };
let currentPage = 'log';
let techFilter = 'all';
let selectedDuration = 0;

function save() { try { localStorage.setItem('bjj_v2', JSON.stringify(state)); } catch(e) {} }
function load() { try { const d = localStorage.getItem('bjj_v2'); if (d) state = JSON.parse(d); } catch(e) {} }

function formatDate(d) {
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
}
function lastPracticed(id) {
  for (const l of state.logs) { if ((l.techniques||[]).includes(id)) return l.date; }
  return null;
}
function practiceCount(id) { return state.logs.filter(l => (l.techniques||[]).includes(id)).length; }
function daysSince(d) { return d ? Math.floor((Date.now() - new Date(d+'T00:00:00')) / 86400000) : 999; }
function getYouTubeId(url) {
  if (!url) return null;
  const m = url.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => { p.classList.remove('active'); p.style.display = 'none'; });
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const pageEl = document.getElementById('page-' + page);
  if (page === 'chat') {
    pageEl.style.display = 'flex';
  } else {
    pageEl.style.display = 'block';
    pageEl.classList.add('active');
  }
  document.getElementById('nav-' + page).classList.add('active');
  const titles = { log: '練習記録', tech: '技ライブラリ', dash: 'レポート', chat: 'テクニック検索', master: '設定' };
  document.getElementById('header-sub').textContent = titles[page] || '';
  const addBtn = document.getElementById('add-btn');
  if (page === 'log')  { addBtn.style.display = ''; addBtn.textContent = '+ 記録'; }
  else if (page === 'tech') { addBtn.style.display = ''; addBtn.textContent = '+ 技'; }
  else { addBtn.style.display = 'none'; }
  render();
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function openAddModal() {
  if (currentPage === 'log') openLogModal();
  else if (currentPage === 'tech') openTechModal();
}

function openLogModal() {
  document.getElementById('log-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('log-sparring').value = '';
  document.getElementById('log-memo').value = '';
  selectedDuration = 0;
  document.querySelectorAll('.duration-btn').forEach(b => b.classList.remove('selected'));
  const sel = document.getElementById('log-class');
  sel.innerHTML = '<option value="">クラスを選択</option>';
  state.classes.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o); });
  const grid = document.getElementById('log-tech-chips');
  grid.innerHTML = '';
  if (state.techniques.length === 0) {
    grid.innerHTML = '<span style="color:var(--muted);font-size:12px;">先に技ライブラリに技を追加してください</span>';
  } else {
    state.techniques.forEach(t => {
      const chip = document.createElement('div');
      chip.className = 'tech-chip';
      chip.textContent = t.name;
      chip.dataset.id = String(t.id);
      chip.addEventListener('click', function() { this.classList.toggle('selected'); });
      grid.appendChild(chip);
    });
  }
  openModal('modal-log');
}

function openTechModal() {
  document.getElementById('tech-name').value = '';
  document.getElementById('tech-video').value = '';
  document.getElementById('tech-memo').value = '';
  openModal('modal-tech');
}

function saveLog() {
  const date = document.getElementById('log-date').value;
  if (!date) { alert('日付を入力してください'); return; }
  const selectedChips = document.querySelectorAll('#log-tech-chips .tech-chip.selected');
  const techIds = Array.from(selectedChips).map(c => Number(c.dataset.id));
  const saveBtn = document.getElementById('save-log-btn');
  const editId = saveBtn.dataset.editId;
  const data = { date, className: document.getElementById('log-class').value, duration: selectedDuration, techniques: techIds, sparring: document.getElementById('log-sparring').value, memo: document.getElementById('log-memo').value };
  if (editId) {
    const idx = state.logs.findIndex(l => l.id === Number(editId));
    if (idx !== -1) state.logs[idx] = { ...state.logs[idx], ...data };
    delete saveBtn.dataset.editId;
    document.querySelector('#modal-log .modal-title').textContent = '練習ログを追加';
  } else {
    state.logs.unshift({ id: Date.now(), ...data });
  }
  save(); closeModal('modal-log'); render();
}

function saveTech() {
  const name = document.getElementById('tech-name').value.trim();
  if (!name) { alert('技名を入力してください'); return; }
  const saveBtn = document.getElementById('save-tech-btn');
  const editId = saveBtn.dataset.editId;
  const data = { name, category: document.getElementById('tech-category').value, videoUrl: document.getElementById('tech-video').value.trim(), memo: document.getElementById('tech-memo').value.trim() };
  if (editId) {
    const idx = state.techniques.findIndex(t => t.id === Number(editId));
    if (idx !== -1) state.techniques[idx] = { ...state.techniques[idx], ...data };
    delete saveBtn.dataset.editId;
    document.querySelector('#modal-tech .modal-title').textContent = '技を追加';
  } else {
    state.techniques.push({ id: Date.now(), ...data });
  }
  save(); closeModal('modal-tech'); render();
}

function addClass() {
  const input = document.getElementById('new-class-input');
  const name = input.value.trim();
  if (!name || state.classes.includes(name)) return;
  state.classes.push(name);
  input.value = '';
  save();
  renderMaster();
}

function deleteClass(name) {
  state.classes = state.classes.filter(c => c !== name);
  save(); renderMaster();
}

function selectDur(val) {
  selectedDuration = val;
  document.getElementById('dur-45').classList.toggle('selected', val === 45);
  document.getElementById('dur-90').classList.toggle('selected', val === 90);
}

function viewLog(id) {
  const log = state.logs.find(l => l.id === id);
  if (!log) return;
  const techHTML = (log.techniques||[]).map(tid => {
    const t = state.techniques.find(t => t.id === tid);
    if (!t) return '';
    return `<span class="belt-badge ${CATEGORIES[t.category]?.cls||'belt-other'}">${t.name}</span>`;
  }).join('');
  document.getElementById('view-log-content').innerHTML = `
    <div class="modal-title">${formatDate(log.date)}</div>
    <p style="color:var(--muted);font-size:13px;margin-bottom:14px;">${log.className||''}${log.className&&log.duration?' ':''}${log.duration?log.duration+'分':''}</p>
    ${techHTML?`<div><p class="form-label">習った技</p><div class="log-techniques" style="margin-bottom:14px;">${techHTML}</div></div>`:''}
    ${log.sparring?`<div><p class="form-label">スパーリング</p><p style="font-size:14px;margin-bottom:14px;">${log.sparring}</p></div>`:''}
    ${log.memo?`<div><p class="form-label">メモ</p><p style="font-size:14px;line-height:1.7;margin-bottom:14px;">${log.memo}</p></div>`:''}
    <div id="ai-summary-result" style="display:none;background:rgba(201,168,76,0.06);border:1px solid var(--gold-dim);border-radius:8px;padding:12px;margin-bottom:12px;font-size:13px;line-height:1.7;"></div>
    <button type="button" class="btn btn-ghost" style="width:100%;margin-bottom:8px;border-color:var(--gold-dim);color:var(--gold);" data-ai-summary="${log.id}">🤖 AIで練習を振り返る</button>
      <button type="button" class="btn btn-ghost" style="flex:1;" data-edit-log="${log.id}">編集</button>
      <button type="button" class="btn btn-danger" style="flex:1;" data-delete-log="${log.id}">削除</button>
    </div>
    <button type="button" class="btn btn-ghost" style="width:100%;margin-top:8px;" data-close="modal-view-log">閉じる</button>`;
  openModal('modal-view-log');
}

function viewTech(id) {
  const tech = state.techniques.find(t => t.id === id);

  const cat = CATEGORIES[tech.category]||CATEGORIES.other;
  const last = lastPracticed(tech.id);

    <div style="display:flex;gap:20px;margin-bottom:14px;">
      <div><p class="form-label">練習回数</p><p style="font-size:22px;font-weight:800;color:var(--gold);">${count}<span style="font-size:12px;color:var(--muted);"> 回</span></p></div>
      <div><p class="form-label">最終練習</p><p style="font-size:13px;">${last?formatDate(last):'未練習'}</p></div>
    </div>
    ${tech.memo?`<div><p class="form-label">メモ</p><p style="font-size:14px;line-height:1.7;margin-bottom:14px;">${tech.memo}</p></div>`:''}
    ${vidId?`<div><p class="form-label">参考動画</p><div class="video-container"><iframe src="https://www.youtube.com/embed/${vidId}" allowfullscreen></iframe></div></div>`:tech.videoUrl?`<a href="${tech.videoUrl}" target="_blank" style="color:var(--gold);font-size:13px;">▶ 動画を見る</a>`:''}
    <div style="display:flex;gap:8px;margin-top:18px;">
      <button type="button" class="btn btn-ghost" style="flex:1;" data-edit-tech="${tech.id}">編集</button>

    </div>
    <button type="button" class="btn btn-ghost" style="width:100%;margin-top:8px;" data-close="modal-view-tech">閉じる</button>`;

}

function editLog(id) {
  const log = state.logs.find(l => l.id === id);
  if (!log) return;
  closeModal('modal-view-log');

  // Populate form with existing data
  document.getElementById('log-date').value = log.date;
  document.getElementById('log-sparring').value = log.sparring || '';
  document.getElementById('log-memo').value = log.memo || '';

  // Duration
  selectedDuration = log.duration || 0;
  document.getElementById('dur-45').classList.toggle('selected', selectedDuration === 45);
  document.getElementById('dur-90').classList.toggle('selected', selectedDuration === 90);

  // Class
  const sel = document.getElementById('log-class');
  sel.innerHTML = '<option value="">クラスを選択</option>';
  state.classes.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o); });
  sel.value = log.className || '';

  // Tech chips
  const grid = document.getElementById('log-tech-chips');
  grid.innerHTML = '';
  if (state.techniques.length === 0) {
    grid.innerHTML = '<span style="color:var(--muted);font-size:12px;">先に技ライブラリに技を追加してください</span>';
  } else {
    state.techniques.forEach(t => {
      const chip = document.createElement('div');
      chip.className = 'tech-chip' + ((log.techniques||[]).includes(t.id) ? ' selected' : '');

function editTech(id) {

  closeModal('modal-view-tech');

  document.getElementById('tech-category').value = tech.category;

  document.getElementById('save-tech-btn').dataset.editId = String(id);

function render() {
  if (currentPage === 'log') renderLogs();
  else if (currentPage === 'tech') renderTechs();
  else if (currentPage === 'dash') { renderDash(); renderGrowth(); }
  else if (currentPage === 'master') renderMaster();
}

function renderLogs() {
  const el = document.getElementById('log-list');
  if (!state.logs.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">まだ練習記録がありません<br>右上の「+ 記録」から追加しましょう</div></div>'; return; }
  const sorted = [...state.logs].sort((a,b) => b.date.localeCompare(a.date));
  el.innerHTML = sorted.map(log => {
    const techHTML = (log.techniques||[]).map(tid => {
      const t = state.techniques.find(t => t.id === tid);
      return t ? `<span class="belt-badge ${CATEGORIES[t.category]?.cls||'belt-other'}">${t.name}</span>` : '';
    }).join('');
    return `<div class="card" style="cursor:pointer;" data-view-log="${log.id}">
      <div class="card-header">
        <div><div class="log-date">${formatDate(log.date)}</div><div class="log-meta">${log.className||''}${log.className&&log.duration?' · ':''}${log.duration?log.duration+'分':''}</div></div>
        ${log.sparring?`<span style="font-size:11px;color:var(--muted);">🥋 ${log.sparring}</span>`:''}
      </div>
      ${techHTML?`<div class="log-techniques">${techHTML}</div>`:''}
      ${log.memo?`<div class="log-memo">${log.memo.substring(0,60)}${log.memo.length>60?'…':''}</div>`:''}
    </div>`;
  }).join('');
}

function renderTechs() {
  const bar = document.getElementById('tech-filter-bar');
  bar.innerHTML = [['all','すべて'],...Object.entries(CATEGORIES).map(([k,v])=>[k,v.label])].map(([k,v])=>
    `<div class="filter-chip${techFilter===k?' active':''}" data-filter="${k}">${v}</div>`).join('');
  const filtered = techFilter==='all' ? state.techniques : state.techniques.filter(t=>t.category===techFilter);
  const el = document.getElementById('tech-list');
  if (!filtered.length) { el.innerHTML = `<div class="empty"><div class="empty-icon">⭐</div><div class="empty-text">${!state.techniques.length?'まだ技が登録されていません<br>右上の「+ 技」から追加しましょう':'このカテゴリに技がありません'}</div></div>`; return; }
  el.innerHTML = filtered.map(tech => {
    const last = lastPracticed(tech.id);
    const stale = daysSince(last) > 14;
    const count = practiceCount(tech.id);
    const cat = CATEGORIES[tech.category]||CATEGORIES.other;
    return `<div class="card" style="cursor:pointer;" data-view-tech="${tech.id}">
      <div class="card-header">
        <div><span class="tech-name">${tech.name}</span>${stale?'<span class="stale-badge">復習しよう</span>':''}<div style="margin-top:4px;"><span class="belt-badge ${cat.cls}">${cat.label}</span></div></div>
        <div style="text-align:right;font-size:11px;color:var(--muted);">${count>0?`<div>${count}回練習</div>`:''}<div>${last?formatDate(last):'未練習'}</div></div>
      </div>
      ${tech.memo?`<div class="log-memo">${tech.memo.substring(0,50)}${tech.memo.length>50?'…':''}</div>`:''}
      ${tech.videoUrl?`<span style="color:var(--gold);font-size:12px;margin-top:6px;display:block;">▶ 動画あり</span>`:''}
    </div>`;
  }).join('');
}

function renderDash() {
  const now = new Date();
  const thisMonth = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  const weekStart = new Date(now); weekStart.setDate(now.getDate()-now.getDay());
  const weekStartStr = weekStart.toISOString().slice(0,10);
  const totalMins = state.logs.reduce((s,l)=>s+(l.duration||0),0);
  const monthMins = state.logs.filter(l=>l.date.startsWith(thisMonth)).reduce((s,l)=>s+(l.duration||0),0);
  const weekMins  = state.logs.filter(l=>l.date>=weekStartStr).reduce((s,l)=>s+(l.duration||0),0);
  const fmt = m => (m/60).toFixed(1);
  document.getElementById('stat-total-hours').innerHTML = `${fmt(totalMins)}<span style="font-size:12px;color:var(--muted);"> h</span>`;
  document.getElementById('stat-total-count').innerHTML = `${state.logs.length}<span style="font-size:12px;color:var(--muted);"> 回</span>`;
  document.getElementById('stat-month-hours').innerHTML = `${fmt(monthMins)}<span style="font-size:12px;color:var(--muted);"> h</span>`;
  document.getElementById('stat-week-hours').innerHTML  = `${fmt(weekMins)}<span style="font-size:12px;color:var(--muted);"> h</span>`;
  document.getElementById('stat-tech-count').innerHTML  = `${state.techniques.length}<span style="font-size:12px;color:var(--muted);"> 技</span>`;
  const practiced = state.techniques.filter(t=>practiceCount(t.id)>0).length;
  document.getElementById('stat-practiced-count').innerHTML = `${practiced}<span style="font-size:12px;color:var(--muted);"> 技</span>`;

  const months = [];
  for (let i=5;i>=0;i--) { const d=new Date(now.getFullYear(),now.getMonth()-i,1); months.push({key:d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'),label:(d.getMonth()+1)+'月'}); }
  const counts = months.map(m=>state.logs.filter(l=>l.date.startsWith(m.key)).length);
  const maxC = Math.max(...counts,1);
  const bw=32,gap=10,ch=100,pl=8;
  const svgW = months.length*(bw+gap)+pl;
  const bars = months.map((m,i)=>{
    const h=Math.round((counts[i]/maxC)*ch); const x=pl+i*(bw+gap); const y=ch-h;
    return `<rect x="${x}" y="${y}" width="${bw}" height="${h||2}" rx="4" fill="rgba(201,168,76,0.75)"/>
    <text x="${x+bw/2}" y="${ch+14}" text-anchor="middle" fill="#6b7a8d" font-size="10">${m.label}</text>
    ${counts[i]>0?`<text x="${x+bw/2}" y="${y-4}" text-anchor="middle" fill="#c9a84c" font-size="10">${counts[i]}</text>`:''}`;
  }).join('');
  document.getElementById('chart-monthly').innerHTML = `<svg width="100%" viewBox="0 0 ${svgW} ${ch+22}" xmlns="http://www.w3.org/2000/svg">${bars}</svg>`;

  const catCounts={};
  state.techniques.forEach(t=>{catCounts[t.category]=(catCounts[t.category]||0)+1;});
  const total=state.techniques.length||1;
  document.getElementById('stat-categories').innerHTML = Object.entries(CATEGORIES).map(([key,val])=>{
    const c=catCounts[key]||0; const pct=Math.round(c/total*100);
    return `<div style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;margin-bottom:4px;"><span class="belt-badge ${val.cls}">${val.label}</span><span style="font-size:12px;color:var(--muted);">${c}技</span></div><div style="background:var(--surface2);border-radius:4px;height:6px;"><div style="background:var(--gold-dim);height:6px;border-radius:4px;width:${pct}%;"></div></div></div>`;
  }).join('');

  const classMins={};
  state.logs.forEach(l=>{if(l.className)classMins[l.className]=(classMins[l.className]||0)+(l.duration||0);});
  const sorted=Object.entries(classMins).sort((a,b)=>b[1]-a[1]);
  const maxM=sorted[0]?.[1]||1;
  document.getElementById('stat-classes').innerHTML = sorted.length ? sorted.map(([name,mins])=>
    `<div style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;margin-bottom:4px;"><span style="font-size:13px;">${name}</span><span style="font-size:12px;color:var(--muted);">${(mins/60).toFixed(1)}h</span></div><div style="background:var(--surface2);border-radius:4px;height:6px;"><div style="background:var(--gold-dim);height:6px;border-radius:4px;width:${Math.round(mins/maxM*100)}%;"></div></div></div>`
  ).join('') : '<p style="color:var(--muted);font-size:13px;">データがありません</p>';
}

function renderGrowth() {
  // Growth insights
  const streak = calcStreak();
  const insights = document.getElementById('growth-insights');
  insights.innerHTML = `
    <div class="form-label" style="margin-bottom:10px;">上達インサイト</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div style="text-align:center;">
        <div style="font-size:24px;font-weight:800;color:var(--gold);">${streak}<span style="font-size:12px;color:var(--muted);font-weight:400;"> 日</span></div>
        <div class="form-label" style="margin-top:2px;">連続練習</div>
      </div>
      <div style="text-align:center;">
        <div style="font-size:24px;font-weight:800;color:var(--white);">${calcAvgInterval()}<span style="font-size:12px;color:var(--muted);font-weight:400;"> 日</span></div>
        <div class="form-label" style="margin-top:2px;">平均練習間隔</div>
      </div>
    </div>`;

  // Cumulative hours chart
  const sorted2 = [...state.logs].sort((a,b)=>a.date.localeCompare(b.date));
  let cumMins = 0;
  const cumData = sorted2.map(l => { cumMins += (l.duration||0); return { date: l.date, h: cumMins/60 }; });
  if (cumData.length >= 2) {
    const maxH = cumData[cumData.length-1].h || 1;
    const svgW2 = 300; const svgH2 = 80; const padL2 = 30; const padB2 = 16;
    const pts = cumData.map((d,i) => {
      const x = padL2 + (i / (cumData.length-1)) * (svgW2 - padL2 - 8);
      const y = svgH2 - padB2 - ((d.h / maxH) * (svgH2 - padB2 - 8));
      return `${x},${y}`;
    }).join(' ');
    const lastPt = pts.split(' ').pop().split(',');
    document.getElementById('chart-cumulative').innerHTML = `<svg width="100%" viewBox="0 0 ${svgW2} ${svgH2+4}" xmlns="http://www.w3.org/2000/svg">
      <text x="${padL2-2}" y="${svgH2-padB2}" text-anchor="end" fill="#6b7a8d" font-size="9">0h</text>
      <text x="${padL2-2}" y="10" text-anchor="end" fill="#6b7a8d" font-size="9">${maxH.toFixed(0)}h</text>
      <polyline points="${pts}" fill="none" stroke="rgba(201,168,76,0.7)" stroke-width="2" stroke-linejoin="round"/>
      <circle cx="${lastPt[0]}" cy="${lastPt[1]}" r="3" fill="var(--gold)"/>
      <text x="${svgW2-6}" y="${svgH2}" text-anchor="end" fill="#6b7a8d" font-size="9">${cumData[cumData.length-1].date.slice(5)}</text>
      <text x="${padL2}" y="${svgH2}" fill="#6b7a8d" font-size="9">${cumData[0].date.slice(5)}</text>
    </svg>`;
  } else {
    document.getElementById('chart-cumulative').innerHTML = '<p style="color:var(--muted);font-size:12px;text-align:center;padding:16px 0;">データが2件以上になると表示されます</p>';
  }

  // Top 5 techniques
  const techRanking = state.techniques.map(t => ({ name: t.name, count: practiceCount(t.id), cat: t.category }))
    .filter(t => t.count > 0).sort((a,b) => b.count - a.count).slice(0,5);
  const maxCount2 = techRanking[0]?.count || 1;
  document.getElementById('stat-top-techs').innerHTML = techRanking.length ? techRanking.map((t,i) => {
    const cat = CATEGORIES[t.cat]||CATEGORIES.other;
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
      <span style="font-size:11px;color:var(--muted);width:14px;text-align:right;">${i+1}</span>
      <div style="flex:1;">
        <div style="display:flex;justify-content:space-between;margin-bottom:3px;">
          <span style="font-size:13px;">${t.name}</span>
          <span style="font-size:11px;color:var(--muted);">${t.count}回</span>
        </div>
        <div style="background:var(--surface2);border-radius:4px;height:5px;">
          <div style="background:var(--gold-dim);height:5px;border-radius:4px;width:${Math.round(t.count/maxCount2*100)}%;"></div>
        </div>
      </div>
      <span class="belt-badge ${cat.cls}" style="font-size:10px;padding:2px 6px;">${cat.label}</span>
    </div>`;
  }).join('') : '<p style="color:var(--muted);font-size:12px;">練習済みの技がありません</p>';
}

function renderMaster() {
  const el = document.getElementById('class-list');
  el.innerHTML = state.classes.length ? state.classes.map(c=>
    `<div class="class-chip-row"><span style="font-size:14px;">${c}</span><button type="button" class="btn btn-danger btn-sm" data-delete-class="${c}">削除</button></div>`
  ).join('') : '<p style="color:var(--muted);font-size:13px;padding:8px 0;">クラスが登録されていません</p>';
}

function calcStreak() {
  if (!state.logs.length) return 0;
  const dates = [...new Set(state.logs.map(l=>l.date))].sort().reverse();
  const today = new Date().toISOString().slice(0,10);
  let streak = 0; let cur = today;
  for (const d of dates) {
    if (d === cur) { streak++; const dt = new Date(cur+'T00:00:00'); dt.setDate(dt.getDate()-1); cur = dt.toISOString().slice(0,10); }
    else if (d < cur) break;
  }
  return streak;
}

function calcAvgInterval() {
  const dates = [...new Set(state.logs.map(l=>l.date))].sort();
  if (dates.length < 2) return '-';
  let total = 0;
  for (let i=1;i<dates.length;i++) total += (new Date(dates[i]+'T00:00:00') - new Date(dates[i-1]+'T00:00:00')) / 86400000;
  return (total / (dates.length-1)).toFixed(1);
}

// ── AI Functions ──────────────────────────────────────────────────
async function callAI(prompt) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 1000, messages: [{ role: 'user', content: prompt }] })
  });
  const data = await res.json();
  return data.content[0].text;
}

async function aiSummarizeLog(logId) {
  const log = state.logs.find(l => l.id === logId);
  if (!log) return;
  const techNames = (log.techniques||[]).map(id => state.techniques.find(t=>t.id===id)?.name).filter(Boolean).join('、');
  const resultEl = document.getElementById('ai-summary-result');
  const btn = document.querySelector(`[data-ai-summary="${logId}"]`);
  if (!btn) return;
  btn.disabled = true; btn.textContent = '⏳ 分析中...';
  resultEl.style.display = 'none';

  const prompt = `あなたはBJJコーチです。以下の練習記録を分析し、簡潔に振り返りをまとめてください。

日付: ${log.date}
クラス: ${log.className || '未記録'}
練習時間: ${log.duration ? log.duration+'分' : '未記録'}
習った技: ${techNames || 'なし'}
スパーリング: ${log.sparring || 'なし'}
メモ: ${log.memo || 'なし'}

以下の形式で日本語で出力してください（簡潔に）：
【今日の課題】
・（メモから読み取れる課題を1〜2点）

【次回に活かすポイント】
・（具体的なアドバイスを1〜2点）

【一言コメント】
（励ましや気づきを一文で）`;

  try {
    const reply = await callAI(prompt);
    resultEl.innerHTML = reply.split('\n').map(l => {
      l = l.trim(); if (!l) return '<br>';
      if (l.startsWith('【')) return `<div style="color:var(--gold);font-weight:700;margin:8px 0 3px;">${l}</div>`;
      if (l.startsWith('・')) return `<div style="padding-left:12px;margin-bottom:2px;">・${l.slice(1).trim()}</div>`;
      return `<div>${l}</div>`;
    }).join('');
    resultEl.style.display = 'block';
    btn.textContent = '🔄 再分析する';
  } catch(e) {
    btn.textContent = '❌ エラー。再試行';
  }
  btn.disabled = false;
}

async function aiGrowthAnalysis() {

  const resultEl = document.getElementById('ai-growth-result');
  btn.disabled = true; btn.textContent = '⏳ 分析中...';

  const recentMemos = recentLogs.map(l=>`${l.date}: ${l.memo||'メモなし'}`).join('\n');

以下の形式で日本語で出力してください：
【成長傾向の分析】
・（データから読み取れること）

【強みと課題】
・（強み）
・（課題）

  try {

    resultEl.innerHTML = reply.split('\n').map(l => {

    }).join('');
    resultEl.style.display = 'block';
    btn.textContent = '🔄 再分析する';
  } catch(e) {

// ── Event delegation (single listener) ──────────────────────────
document.addEventListener('click', function(e) {
  const t = e.target;

  if (t.closest('#nav-chat'))   { showPage('chat'); return; }
  // Nav
  if (t.closest('#nav-log'))    { showPage('log'); return; }
  if (t.closest('#nav-tech'))   { showPage('tech'); return; }
  if (t.closest('#nav-dash'))   { showPage('dash'); return; }
  if (t.closest('#nav-master')) { showPage('master'); return; }

  // Add button
  if (t.closest('#add-btn')) { openAddModal(); return; }

  // Duration buttons
  if (t.id === 'dur-45') { selectDur(45); return; }
  if (t.id === 'dur-90') { selectDur(90); return; }

  // Save / cancel
  if (t.id === 'save-log-btn')   { saveLog(); return; }
  if (t.id === 'cancel-log-btn') { closeModal('modal-log'); return; }
  if (t.id === 'save-tech-btn')  { saveTech(); return; }
  if (t.id === 'cancel-tech-btn'){ closeModal('modal-tech'); return; }

  // Add class
  if (t.id === 'add-class-btn') { addClass(); return; }

  // View log/tech cards
  const logCard = t.closest('[data-view-log]');
  if (logCard) { viewLog(Number(logCard.dataset.viewLog)); return; }
  const techCard = t.closest('[data-view-tech]');
  if (techCard) { viewTech(Number(techCard.dataset.viewTech)); return; }

  if (t.dataset.aiSummary) { aiSummarizeLog(Number(t.dataset.aiSummary)); return; }
  if (t.id === 'ai-growth-btn') { aiGrowthAnalysis(); return; }

  // Edit
  if (t.dataset.editLog)  { editLog(Number(t.dataset.editLog)); return; }
  if (t.dataset.editTech) { editTech(Number(t.dataset.editTech)); return; }

  // Delete
  if (t.dataset.deleteLog) {
    if (confirm('この記録を削除しますか？')) { state.logs = state.logs.filter(l=>l.id!==Number(t.dataset.deleteLog)); save(); closeModal('modal-view-log'); render(); }
    return;
  }
  if (t.dataset.deleteTech) {
    if (confirm('この技を削除しますか？')) { state.techniques = state.techniques.filter(t2=>t2.id!==Number(t.dataset.deleteTech)); save(); closeModal('modal-view-tech'); render(); }
    return;
  }
  if (t.dataset.deleteClass) { deleteClass(t.dataset.deleteClass); return; }

  // Close modal
  if (t.dataset.close) { closeModal(t.dataset.close); return; }

  // Filter chips
  if (t.dataset.filter) { techFilter = t.dataset.filter; renderTechs(); return; }

  // Close modal by overlay click
  const overlay = t.closest('.modal-overlay');
  if (overlay && t === overlay) { overlay.classList.remove('open'); return; }
});

// Autocomplete
function initAutocomplete() {
  const input = document.getElementById('tech-name');
  const suggest = document.getElementById('tech-suggest');
  if (!input || !suggest) return;

  input.addEventListener('input', function() {
    const val = this.value.trim();
    if (!val) { suggest.style.display = 'none'; return; }
    const matches = BJJ_TECHS.filter(t => t.name.includes(val));
    if (!matches.length) { suggest.style.display = 'none'; return; }
    suggest.innerHTML = matches.slice(0,8).map(t =>
      `<div data-suggest-name="${t.name}" data-suggest-cat="${t.category}" data-suggest-desc="${t.desc}" style="padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--border);font-size:13px;">
        <span>${t.name}</span>
        <span class="belt-badge ${CATEGORIES[t.category]?.cls||'belt-other'}" style="margin-left:6px;font-size:10px;">${CATEGORIES[t.category]?.label||''}</span>
      </div>`
    ).join('');
    suggest.style.display = 'block';
  });

  suggest.addEventListener('click', function(e) {
    const item = e.target.closest('[data-suggest-name]');
    if (!item) return;
    input.value = item.dataset.suggestName;
    document.getElementById('tech-category').value = item.dataset.suggestCat;
    document.getElementById('tech-memo').value = item.dataset.suggestDesc;
    suggest.style.display = 'none';
  });

  document.addEventListener('click', function(e) {
    if (!suggest.contains(e.target) && e.target !== input) suggest.style.display = 'none';
  });
}

// ── Chat ─────────────────────────────────────────────────────────
const CHAT_SUGGESTIONS = [
  'クローズドガードからの攻め方',
  '三角絞めの掛け方',
  'マウントから逃げる方法',
  'デラヒーバガードとは？',
  'バックを取った後の絞め方',
  'ハーフガードからのスイープ',
  'ギロチンの防ぎ方',
];
const CHAT_SYSTEM = `あなたはブラジリアン柔術（BJJ）の専門家コーチです。日本語で簡潔かつ実践的に答えてください。重要なポイントは【ポイント】として示し、手順は「・」で箇条書きにし、コツや注意点があれば「コツ：」として追記してください。プレーンテキストで返してください。`;
let chatMessages = [];
let chatLoading = false;

function initChat() {
  const chips = document.getElementById('chat-chips');
  CHAT_SUGGESTIONS.forEach(s => {
    const b = document.createElement('button');
    b.style.cssText = 'white-space:nowrap;padding:7px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:12px;cursor:pointer;flex-shrink:0;font-family:inherit;';
    b.textContent = s;
    b.addEventListener('click', () => chatSend(s));
    chips.appendChild(b);
  });
  const input = document.getElementById('chat-input');
  const sendBtn = document.getElementById('chat-send');
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    sendBtn.disabled = !input.value.trim() || chatLoading;
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) chatSend(input.value.trim()); }
  });
  sendBtn.addEventListener('click', () => { if (!sendBtn.disabled) chatSend(input.value.trim()); });
}

function chatSend(text) {
  if (!text || chatLoading) return;
  const input = document.getElementById('chat-input');
  input.value = ''; input.style.height = 'auto';
  document.getElementById('chat-send').disabled = true;
  document.getElementById('chat-empty').style.display = 'none';
  chatAppend('user', text);
  chatMessages.push({ role: 'user', content: text });
  const typing = chatTyping();
  chatLoading = true;
  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 1000, system: CHAT_SYSTEM, messages: chatMessages })
  })
  .then(r => r.json())
  .then(data => { const reply = data.content[0].text; typing.remove(); chatAppend('ai', reply); chatMessages.push({ role: 'assistant', content: reply }); })
  .catch(() => { typing.remove(); chatAppend('ai', 'エラーが発生しました。もう一度お試しください。'); })
  .finally(() => { chatLoading = false; document.getElementById('chat-send').disabled = !document.getElementById('chat-input').value.trim(); });
}

function chatFormatText(text) {
  return text.split('\n').map(line => {
    line = line.trim(); if (!line) return '<br>';
    if (line.startsWith('【') && line.includes('】')) return `<div style="color:var(--gold);font-weight:700;font-size:13px;margin:10px 0 4px;padding-bottom:4px;border-bottom:1px solid var(--border);">${line}</div>`;
    if (line.startsWith('コツ：') || line.startsWith('注意：')) return `<div style="background:rgba(201,168,76,0.08);border-left:3px solid var(--gold-dim);border-radius:0 6px 6px 0;padding:8px 10px;margin-top:10px;font-size:12.5px;color:#c8b87a;">${line}</div>`;
    if (line.startsWith('・')) return `<li style="margin-bottom:4px;">${line.slice(1).trim()}</li>`;
    return `<span>${line}</span><br>`;
  }).join('').replace(/(<li[^>]*>.*?<\/li>)+/gs, m => `<ul style="padding-left:16px;margin:6px 0;">${m}</ul>`);
}

function chatAppend(role, text) {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.style.cssText = `display:flex;gap:8px;align-items:flex-start;${role==='user'?'flex-direction:row-reverse;':''}`;
  const avatar = document.createElement('div');
  avatar.style.cssText = `width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:2px;${role==='user'?'background:var(--gold-dim);color:var(--bg);font-weight:700;':'background:var(--surface2);border:1px solid var(--border);'}`;
  avatar.textContent = role === 'user' ? 'K' : '🥋';
  const bubble = document.createElement('div');
  bubble.style.cssText = `max-width:82%;padding:10px 13px;border-radius:12px;line-height:1.65;font-size:13.5px;${role==='user'?'background:#1e2d1e;border:1px solid #2a442a;border-top-right-radius:3px;color:#c8e6c8;':'background:#1a2233;border:1px solid var(--border);border-top-left-radius:3px;'}`;
  if (role === 'ai') bubble.innerHTML = chatFormatText(text);
  else bubble.textContent = text;
  div.appendChild(avatar); div.appendChild(bubble);
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function chatTyping() {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.style.cssText = 'display:flex;gap:8px;align-items:flex-start;';
  const avatar = document.createElement('div');
  avatar.style.cssText = 'width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;background:var(--surface2);border:1px solid var(--border);';
  avatar.textContent = '🥋';
  const bubble = document.createElement('div');
  bubble.style.cssText = 'padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;border-top-left-radius:3px;';
  bubble.innerHTML = `<div style="display:flex;gap:4px;align-items:center;"><span style="width:7px;height:7px;border-radius:50%;background:var(--muted);display:inline-block;animation:bounce 1.2s infinite;"></span><span style="width:7px;height:7px;border-radius:50%;background:var(--muted);display:inline-block;animation:bounce 1.2s infinite 0.2s;"></span><span style="width:7px;height:7px;border-radius:50%;background:var(--muted);display:inline-block;animation:bounce 1.2s infinite 0.4s;"></span></div>`;
  div.appendChild(avatar); div.appendChild(bubble);
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

load();
initChat();
initAutocomplete();
showPage('log');
</script>
