<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BJJ Logger</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1e2530;
    --border: #2a3444;
    --gold: #c9a84c;
    --gold-dim: #8a6e2e;
    --white: #e8eaf0;
    --muted: #6b7a8d;
    --danger: #e05c5c;
    --success: #4caf7d;

    /* Belt colors */
    --belt-guard: #3a7bd5;
    --belt-pass: #7b3ad5;
    --belt-takedown: #d57b3a;
    --belt-submission: #d53a3a;
    --belt-escape: #3ab87b;
    --belt-other: #6b7a8d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    padding-bottom: 72px;
    font-size: 14px;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--gold);
  }
  .header-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Bottom Nav */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 100;
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 4px 8px;
    cursor: pointer;
    color: var(--muted);
    transition: color 0.15s;
    gap: 3px;
    border: none;
    background: none;
    font-family: inherit;
  }
  .nav-item.active { color: var(--gold); }
  .nav-item svg { width: 22px; height: 22px; }
  .nav-label { font-size: 10px; letter-spacing: 0.04em; }

  /* Pages */
  .page { display: none; padding: 16px; }
  .page.active { display: block; }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }

  /* Form elements */
  .form-group { margin-bottom: 14px; }
  .form-label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  input, select, textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--white);
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--gold-dim);
  }
  textarea { resize: vertical; min-height: 80px; }
  select option { background: var(--surface2); }

  /* Buttons */
  .btn {
    border: none;
    border-radius: 8px;
    padding: 11px 18px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    letter-spacing: 0.03em;
  }
  .btn:active { opacity: 0.75; }
  .btn-primary { background: var(--gold); color: #0d1117; width: 100%; padding: 13px; font-size: 15px; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 8px 14px; font-size: 12px; }
  .btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 6px 12px; font-size: 12px; }
  .btn-sm { padding: 7px 12px; font-size: 12px; }
  .btn-icon { background: none; border: none; cursor: pointer; color: var(--muted); padding: 4px; }

  /* Belt badge (category) */
  .belt-badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
  }
  .belt-guard    { background: rgba(58,123,213,0.2); color: #6fa8f5; border: 1px solid rgba(58,123,213,0.4); }
  .belt-pass     { background: rgba(123,58,213,0.2); color: #b98af5; border: 1px solid rgba(123,58,213,0.4); }
  .belt-takedown { background: rgba(213,123,58,0.2); color: #f5b07a; border: 1px solid rgba(213,123,58,0.4); }
  .belt-submission { background: rgba(213,58,58,0.2); color: #f58080; border: 1px solid rgba(213,58,58,0.4); }
  .belt-escape   { background: rgba(58,184,123,0.2); color: #6fe0a8; border: 1px solid rgba(58,184,123,0.4); }
  .belt-other    { background: rgba(107,122,141,0.2); color: #9aabb8; border: 1px solid rgba(107,122,141,0.4); }

  /* Log list */
  .log-date { font-size: 13px; font-weight: 700; color: var(--white); }
  .log-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .log-techniques { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .log-memo { font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.5; }

  /* Technique list */
  .tech-name { font-size: 15px; font-weight: 600; }
  .tech-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .tech-video-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 8px;
    color: var(--gold);
    font-size: 12px;
    text-decoration: none;
  }
  .tech-video-link:active { opacity: 0.7; }

  /* Divider */
  .divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

  /* Section title */
  .section-title {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 12px;
    margin-top: 4px;
  }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 82px;
    right: 16px;
    width: 52px; height: 52px;
    background: var(--gold);
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(201,168,76,0.35);
    z-index: 99;
    transition: transform 0.15s;
  }
  .fab:active { transform: scale(0.92); }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 16px 16px 0 0;
    padding: 20px 16px 32px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    border-top: 1px solid var(--border);
  }
  .modal-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 18px;
    color: var(--gold);
  }
  .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
  .modal-actions .btn { flex: 1; }

  /* Technique multi-select */
  .tech-select-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
  }
  .tech-chip {
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tech-chip.selected {
    border-color: var(--gold-dim);
    background: rgba(201,168,76,0.15);
    color: var(--gold);
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; line-height: 1.6; }

  /* Stale badge */
  .stale-badge {
    font-size: 10px;
    background: rgba(224,92,92,0.15);
    color: #f58080;
    border: 1px solid rgba(224,92,92,0.3);
    border-radius: 4px;
    padding: 2px 6px;
    margin-left: 6px;
  }

  /* Class chips in master */
  .class-chip-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .class-chip-row:last-child { border-bottom: none; }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 8px;
    margin-bottom: 12px;
    scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip {
    white-space: nowrap;
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .filter-chip.active {
    border-color: var(--gold-dim);
    background: rgba(201,168,76,0.15);
    color: var(--gold);
  }

  /* YouTube embed */
  .video-container {
    position: relative;
    padding-bottom: 56.25%;
    height: 0;
    overflow: hidden;
    border-radius: 8px;
    margin-top: 10px;
    background: #000;
  }
  .video-container iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div>
    <div class="header-title">BJJ LOGGER</div>
    <div class="header-sub" id="header-sub">練習記録</div>
  </div>
  <button class="btn btn-ghost btn-sm" id="add-btn" onclick="openAddModal()">+ 追加</button>
</div>

<!-- Pages -->
<div class="page active" id="page-log">
  <p class="section-title">練習ログ</p>
  <div id="log-list"></div>
</div>

<div class="page" id="page-tech">
  <p class="section-title">技ライブラリ</p>
  <div class="filter-bar" id="tech-filter-bar"></div>
  <div id="tech-list"></div>
</div>

<div class="page" id="page-master">
  <p class="section-title">クラス管理</p>
  <div class="card">
    <div id="class-list"></div>
    <div style="display:flex;gap:8px;margin-top:14px;">
      <input id="new-class-input" placeholder="クラス名を入力" style="flex:1;">
      <button class="btn btn-ghost btn-sm" onclick="addClass()">追加</button>
    </div>
  </div>

  <p class="section-title" style="margin-top:20px;">技カテゴリ</p>
  <div class="card">
    <div style="display:flex;flex-wrap:wrap;gap:6px;">
      <span class="belt-badge belt-guard">ガード</span>
      <span class="belt-badge belt-pass">パス</span>
      <span class="belt-badge belt-takedown">テイクダウン</span>
      <span class="belt-badge belt-submission">サブミッション</span>
      <span class="belt-badge belt-escape">エスケープ</span>
      <span class="belt-badge belt-other">その他</span>
    </div>
    <p style="font-size:12px;color:var(--muted);margin-top:10px;">帯の色は技のカテゴリを表します</p>
  </div>
</div>

<!-- Dashboard Page -->
<div class="page" id="page-dash">
  <p class="section-title">ダッシュボード</p>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
    <div class="card" style="text-align:center;">
      <div class="form-label">トータル練習時間</div>
      <div id="stat-total-hours" style="font-size:28px;font-weight:800;color:var(--gold);">0<span style="font-size:13px;color:var(--muted);font-weight:400;"> h</span></div>
    </div>
    <div class="card" style="text-align:center;">
      <div class="form-label">トータル練習回数</div>
      <div id="stat-total-count" style="font-size:28px;font-weight:800;color:var(--gold);">0<span style="font-size:13px;color:var(--muted);font-weight:400;"> 回</span></div>
    </div>
    <div class="card" style="text-align:center;">
      <div class="form-label">今月の練習時間</div>
      <div id="stat-month-hours" style="font-size:28px;font-weight:800;color:var(--white);">0<span style="font-size:13px;color:var(--muted);font-weight:400;"> h</span></div>
    </div>
    <div class="card" style="text-align:center;">
      <div class="form-label">今週の練習時間</div>
      <div id="stat-week-hours" style="font-size:28px;font-weight:800;color:var(--white);">0<span style="font-size:13px;color:var(--muted);font-weight:400;"> h</span></div>
    </div>
    <div class="card" style="text-align:center;">
      <div class="form-label">習得技数</div>
      <div id="stat-tech-count" style="font-size:28px;font-weight:800;color:var(--white);">0<span style="font-size:13px;color:var(--muted);font-weight:400;"> 技</span></div>
    </div>
    <div class="card" style="text-align:center;">
      <div class="form-label">練習済み技数</div>
      <div id="stat-practiced-count" style="font-size:28px;font-weight:800;color:var(--white);">0<span style="font-size:13px;color:var(--muted);font-weight:400;"> 技</span></div>
    </div>
  </div>
  <div class="card" style="margin-bottom:10px;">
    <div class="form-label" style="margin-bottom:12px;">月別練習回数（過去6ヶ月）</div>
    <div id="chart-monthly"></div>
  </div>
  <div class="card" style="margin-bottom:10px;">
    <div class="form-label" style="margin-bottom:12px;">習った技の種類</div>
    <div id="stat-categories"></div>
  </div>
  <div class="card" style="margin-bottom:10px;">
    <div class="form-label" style="margin-bottom:12px;">クラス別練習時間</div>
    <div id="stat-classes"></div>
  </div>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <button class="nav-item active" id="nav-log" onclick="showPage('log')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span class="nav-label">ログ</span>
  </button>
  <button class="nav-item" id="nav-tech" onclick="showPage('tech')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    <span class="nav-label">技</span>
  </button>
  <button class="nav-item" id="nav-dash" onclick="showPage('dash')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    <span class="nav-label">統計</span>
  </button>
  <button class="nav-item" id="nav-master" onclick="showPage('master')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/></svg>
    <span class="nav-label">設定</span>
  </button>
</nav>

<!-- Add Log Modal -->
<div class="modal-overlay" id="modal-log">
  <div class="modal">
    <div class="modal-title">練習ログを追加</div>
    <div class="form-group">
      <label class="form-label">日付</label>
      <input type="date" id="log-date">
    </div>
    <div class="form-group">
      <label class="form-label">クラス</label>
      <select id="log-class"><option value="">クラスを選択</option></select>
    </div>
    <div class="form-group">
      <label class="form-label">練習時間</label>
      <div style="display:flex;gap:10px;">
        <button type="button" class="duration-btn btn btn-ghost" data-val="45" onclick="selectDuration(45)" style="flex:1;font-size:15px;font-weight:700;">45分</button>
        <button type="button" class="duration-btn btn btn-ghost" data-val="90" onclick="selectDuration(90)" style="flex:1;font-size:15px;font-weight:700;">90分</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">習った技</label>
      <div class="tech-select-grid" id="log-tech-chips"></div>
    </div>
    <div class="form-group">
      <label class="form-label">スパーリング（任意）</label>
      <input type="text" id="log-sparring" placeholder="例：3本、タップアウト1回">
    </div>
    <div class="form-group">
      <label class="form-label">メモ</label>
      <textarea id="log-memo" placeholder="気づいたこと、コーチのフィードバックなど"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-log')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveLog()">保存する</button>
    </div>
  </div>
</div>

<!-- Add Technique Modal -->
<div class="modal-overlay" id="modal-tech">
  <div class="modal">
    <div class="modal-title">技を追加</div>
    <div class="form-group">
      <label class="form-label">技名</label>
      <input type="text" id="tech-name" placeholder="例：クローズドガード">
    </div>
    <div class="form-group">
      <label class="form-label">カテゴリ</label>
      <select id="tech-category">
        <option value="guard">ガード</option>
        <option value="pass">パス</option>
        <option value="takedown">テイクダウン</option>
        <option value="submission">サブミッション</option>
        <option value="escape">エスケープ</option>
        <option value="other">その他</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">YouTube URL（任意）</label>
      <input type="url" id="tech-video" placeholder="https://www.youtube.com/watch?v=...">
    </div>
    <div class="form-group">
      <label class="form-label">メモ（コツ・注意点など）</label>
      <textarea id="tech-memo" placeholder="この技のポイント、注意点など"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-tech')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveTech()">保存する</button>
    </div>
  </div>
</div>

<!-- View Log Modal -->
<div class="modal-overlay" id="modal-view-log">
  <div class="modal" id="view-log-content"></div>
</div>

<!-- View Tech Modal -->
<div class="modal-overlay" id="modal-view-tech">
  <div class="modal" id="view-tech-content"></div>
</div>

<script> = 0;

function selectDuration(val) {
  selectedDuration = val;
  document.querySelectorAll('.duration-btn').forEach(btn => {
    const active = parseInt(btn.dataset.val) === val;
    btn.style.borderColor = active ? 'var(--gold-dim)' : '';
    btn.style.background = active ? 'rgba(201,168,76,0.15)' : '';
    btn.style.color = active ? 'var(--gold)' : '';
  });
}
let state = {
  logs: [],
  techniques: [],
  classes: ['White Belt', 'All Belt', 'Basic'],
  selectedLogTechs: []
};

const CATEGORIES = {
  guard: { label: 'ガード', cls: 'belt-guard' },
  pass: { label: 'パス', cls: 'belt-pass' },
  takedown: { label: 'テイクダウン', cls: 'belt-takedown' },
  submission: { label: 'サブミッション', cls: 'belt-submission' },
  escape: { label: 'エスケープ', cls: 'belt-escape' },
  other: { label: 'その他', cls: 'belt-other' }
};

let currentPage = 'log';
let techFilter = 'all';

// ── Storage ────────────────────────────────────────────────────────
function save() { localStorage.setItem('bjj_state', JSON.stringify(state)); }
function load() {
  const d = localStorage.getItem('bjj_state');
  if (d) state = JSON.parse(d);
}

// ── Navigation ────────────────────────────────────────────────────
function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.getElementById('nav-' + page).classList.add('active');

  const titles = { log: '練習記録', tech: '技ライブラリ', dash: '統計', master: '設定' };
  document.getElementById('header-sub').textContent = titles[page];

  const addBtn = document.getElementById('add-btn');
  if (page === 'log') { addBtn.style.display = ''; addBtn.textContent = '+ 記録'; addBtn.onclick = openAddLogModal; }
  else if (page === 'tech') { addBtn.style.display = ''; addBtn.textContent = '+ 技'; addBtn.onclick = openAddTechModal; }
  else { addBtn.style.display = 'none'; }

  render();
}

// ── Modals ────────────────────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

function openAddModal() {
  if (currentPage === 'log') openAddLogModal();
  else if (currentPage === 'tech') openAddTechModal();
}

function openAddLogModal() {
  // Set today
  document.getElementById('log-date').value = new Date().toISOString().slice(0,10);
  selectedDuration = 0;
  document.querySelectorAll('.duration-btn').forEach(btn => {
    btn.style.borderColor = ''; btn.style.background = ''; btn.style.color = '';
  });
  document.getElementById('log-sparring').value = '';
  document.getElementById('log-memo').value = '';
  state.selectedLogTechs = [];

  // Populate class select
  const sel = document.getElementById('log-class');
  sel.innerHTML = '<option value="">クラスを選択</option>';
  state.classes.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o); });

  // Populate tech chips
  const grid = document.getElementById('log-tech-chips');
  grid.innerHTML = '';
  if (state.techniques.length === 0) {
    grid.innerHTML = '<span style="color:var(--muted);font-size:12px;">技ライブラリに技を追加してから選択できます</span>';
  } else {
    state.techniques.forEach(t => {
      const chip = document.createElement('div');
      chip.className = 'tech-chip';
      chip.textContent = t.name;
      chip.dataset.id = t.id;
      chip.onclick = () => {
        const idx = state.selectedLogTechs.indexOf(t.id);
        if (idx === -1) { state.selectedLogTechs.push(t.id); chip.classList.add('selected'); }
        else { state.selectedLogTechs.splice(idx,1); chip.classList.remove('selected'); }
      };
      grid.appendChild(chip);
    });
  }
  openModal('modal-log');
}

function openAddTechModal() {
  document.getElementById('tech-name').value = '';
  document.getElementById('tech-video').value = '';
  document.getElementById('tech-memo').value = '';
  openModal('modal-tech');
}

// ── Save ──────────────────────────────────────────────────────────
function saveLog() {
  const date = document.getElementById('log-date').value;
  const duration = selectedDuration;
  if (!date) { alert('日付を入力してください'); return; }

  const log = {
    id: Date.now(),
    date,
    className: document.getElementById('log-class').value,
    duration,
    techniques: [...state.selectedLogTechs],
    sparring: document.getElementById('log-sparring').value,
    memo: document.getElementById('log-memo').value
  };
  state.logs.unshift(log);
  save();
  closeModal('modal-log');
  render();
}

function saveTech() {
  const name = document.getElementById('tech-name').value.trim();
  if (!name) { alert('技名を入力してください'); return; }

  const tech = {
    id: Date.now(),
    name,
    category: document.getElementById('tech-category').value,
    videoUrl: document.getElementById('tech-video').value.trim(),
    memo: document.getElementById('tech-memo').value.trim(),
    createdAt: new Date().toISOString()
  };
  state.techniques.push(tech);
  save();
  closeModal('modal-tech');
  render();
}

function addClass() {
  const input = document.getElementById('new-class-input');
  const name = input.value.trim();
  if (!name || state.classes.includes(name)) return;
  state.classes.push(name);
  input.value = '';
  save();
  renderMaster();
}

function deleteClass(name) {
  state.classes = state.classes.filter(c => c !== name);
  save();
  renderMaster();
}

// ── YouTube helper ────────────────────────────────────────────────
function getYouTubeId(url) {
  if (!url) return null;
  const m = url.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

// ── Staleness check ───────────────────────────────────────────────
function daysSince(dateStr) {
  if (!dateStr) return 999;
  return Math.floor((Date.now() - new Date(dateStr)) / 86400000);
}

function lastPracticed(techId) {
  for (const log of state.logs) {
    if (log.techniques && log.techniques.includes(techId)) return log.date;
  }
  return null;
}

function practiceCount(techId) {
  return state.logs.filter(l => l.techniques && l.techniques.includes(techId)).length;
}

// ── Render ────────────────────────────────────────────────────────
function render() {
  if (currentPage === 'log') renderLogs();
  else if (currentPage === 'tech') renderTechs();
  else if (currentPage === 'dash') renderDash();
  else if (currentPage === 'master') renderMaster();
}

// ── Dashboard ─────────────────────────────────────────────────────
function renderDash() {
  const now = new Date();
  const thisMonth = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
  const weekStart = new Date(now); weekStart.setDate(now.getDate() - now.getDay());
  const weekStartStr = weekStart.toISOString().slice(0,10);

  const totalMins = state.logs.reduce((s,l) => s + (l.duration||0), 0);
  const monthMins = state.logs.filter(l => l.date.startsWith(thisMonth)).reduce((s,l) => s + (l.duration||0), 0);
  const weekMins  = state.logs.filter(l => l.date >= weekStartStr).reduce((s,l) => s + (l.duration||0), 0);

  const fmt = m => m >= 60 ? (m/60).toFixed(1) : (m/60).toFixed(1);

  document.getElementById('stat-total-hours').innerHTML = `${fmt(totalMins)}<span style="font-size:13px;color:var(--muted);font-weight:400;"> h</span>`;
  document.getElementById('stat-total-count').innerHTML = `${state.logs.length}<span style="font-size:13px;color:var(--muted);font-weight:400;"> 回</span>`;
  document.getElementById('stat-month-hours').innerHTML = `${fmt(monthMins)}<span style="font-size:13px;color:var(--muted);font-weight:400;"> h</span>`;
  document.getElementById('stat-week-hours').innerHTML  = `${fmt(weekMins)}<span style="font-size:13px;color:var(--muted);font-weight:400;"> h</span>`;
  document.getElementById('stat-tech-count').innerHTML  = `${state.techniques.length}<span style="font-size:13px;color:var(--muted);font-weight:400;"> 技</span>`;
  const practiced = state.techniques.filter(t => practiceCount(t.id) > 0).length;
  document.getElementById('stat-practiced-count').innerHTML = `${practiced}<span style="font-size:13px;color:var(--muted);font-weight:400;"> 技</span>`;

  // Monthly bar chart (past 6 months)
  const months = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push({ key: d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0'), label: (d.getMonth()+1) + '月' });
  }
  const monthlyCounts = months.map(m => state.logs.filter(l => l.date.startsWith(m.key)).length);

  // Monthly bar chart (pure SVG, no dependencies)
  const maxCount = Math.max(...monthlyCounts, 1);
  const barW = 32; const gap = 12; const chartH = 120; const padL = 24;
  const svgW = months.length * (barW + gap) + padL;
  const bars = months.map((m, i) => {
    const h = Math.round((monthlyCounts[i] / maxCount) * chartH);
    const x = padL + i * (barW + gap);
    const y = chartH - h;
    return `
      <rect x="${x}" y="${y}" width="${barW}" height="${h}" rx="4" fill="rgba(201,168,76,0.75)"/>
      <text x="${x + barW/2}" y="${chartH + 16}" text-anchor="middle" fill="#6b7a8d" font-size="11">${m.label}</text>
      ${monthlyCounts[i] > 0 ? `<text x="${x + barW/2}" y="${y - 4}" text-anchor="middle" fill="#c9a84c" font-size="11">${monthlyCounts[i]}</text>` : ''}
    `;
  }).join('');
  document.getElementById('chart-monthly').innerHTML = `
    <svg width="100%" viewBox="0 0 ${svgW} ${chartH + 28}" xmlns="http://www.w3.org/2000/svg">
      ${bars}
    </svg>`;

  // Category breakdown
  const catEl = document.getElementById('stat-categories');
  const catCounts = {};
  state.techniques.forEach(t => { catCounts[t.category] = (catCounts[t.category]||0) + 1; });
  const totalTech = state.techniques.length || 1;
  catEl.innerHTML = Object.entries(CATEGORIES).map(([key, val]) => {
    const count = catCounts[key] || 0;
    const pct = Math.round(count / totalTech * 100);
    return `
      <div style="margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
          <span class="belt-badge ${val.cls}">${val.label}</span>
          <span style="font-size:12px;color:var(--muted);">${count}技</span>
        </div>
        <div style="background:var(--surface2);border-radius:4px;height:6px;">
          <div style="background:var(--gold-dim);height:6px;border-radius:4px;width:${pct}%;transition:width 0.4s;"></div>
        </div>
      </div>`;
  }).join('');

  // Class breakdown
  const classEl = document.getElementById('stat-classes');
  const classMins = {};
  state.logs.forEach(l => {
    if (l.className) classMins[l.className] = (classMins[l.className]||0) + (l.duration||0);
  });
  const sorted = Object.entries(classMins).sort((a,b) => b[1]-a[1]);
  const maxMins = sorted[0]?.[1] || 1;
  if (sorted.length === 0) {
    classEl.innerHTML = '<p style="color:var(--muted);font-size:13px;">データがありません</p>';
  } else {
    classEl.innerHTML = sorted.map(([name, mins]) => `
      <div style="margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
          <span style="font-size:13px;">${name}</span>
          <span style="font-size:12px;color:var(--muted);">${(mins/60).toFixed(1)}h</span>
        </div>
        <div style="background:var(--surface2);border-radius:4px;height:6px;">
          <div style="background:var(--gold-dim);height:6px;border-radius:4px;width:${Math.round(mins/maxMins*100)}%;transition:width 0.4s;"></div>
        </div>
      </div>`).join('');
  }
}

function formatDate(d) {
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('ja-JP', { month: 'long', day: 'numeric', weekday: 'short' });
}

function renderLogs() {
  const container = document.getElementById('log-list');
  if (state.logs.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">まだ練習記録がありません<br>右上の「+ 記録」から追加しましょう</div></div>`;
    return;
  }
  container.innerHTML = state.logs.map(log => {
    const techNames = (log.techniques || []).map(id => {
      const t = state.techniques.find(t => t.id === id);
      return t ? `<span class="belt-badge ${CATEGORIES[t.category]?.cls || 'belt-other'}">${t.name}</span>` : '';
    }).join('');
    return `
    <div class="card" onclick="viewLog(${log.id})" style="cursor:pointer;">
      <div class="card-header">
        <div>
          <div class="log-date">${formatDate(log.date)}</div>
          <div class="log-meta">${log.className ? log.className + '　' : ''}${log.duration ? log.duration + '分' : ''}</div>
        </div>
        ${log.sparring ? `<span style="font-size:11px;color:var(--muted);">🥋 ${log.sparring}</span>` : ''}
      </div>
      ${techNames ? `<div class="log-techniques">${techNames}</div>` : ''}
      ${log.memo ? `<div class="log-memo">${log.memo.substring(0,60)}${log.memo.length > 60 ? '…' : ''}</div>` : ''}
    </div>`;
  }).join('');
}

function renderTechs() {
  // Filter bar
  const bar = document.getElementById('tech-filter-bar');
  const filters = [['all', 'すべて'], ...Object.entries(CATEGORIES).map(([k,v]) => [k, v.label])];
  bar.innerHTML = filters.map(([k,v]) =>
    `<div class="filter-chip ${techFilter === k ? 'active' : ''}" onclick="setTechFilter('${k}')">${v}</div>`
  ).join('');

  const container = document.getElementById('tech-list');
  const filtered = techFilter === 'all' ? state.techniques : state.techniques.filter(t => t.category === techFilter);

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">⭐</div><div class="empty-text">${state.techniques.length === 0 ? 'まだ技が登録されていません<br>右上の「+ 技」から追加しましょう' : 'このカテゴリに技がありません'}</div></div>`;
    return;
  }

  container.innerHTML = filtered.map(tech => {
    const last = lastPracticed(tech.id);
    const stale = last ? daysSince(last) > 14 : false;
    const count = practiceCount(tech.id);
    const cat = CATEGORIES[tech.category] || CATEGORIES.other;
    return `
    <div class="card" onclick="viewTech(${tech.id})" style="cursor:pointer;">
      <div class="card-header">
        <div>
          <span class="tech-name">${tech.name}</span>
          ${stale ? '<span class="stale-badge">復習しよう</span>' : ''}
          <div style="margin-top:4px;"><span class="belt-badge ${cat.cls}">${cat.label}</span></div>
        </div>
        <div style="text-align:right;font-size:11px;color:var(--muted);">
          ${count > 0 ? `<div>${count}回練習</div>` : ''}
          ${last ? `<div>${formatDate(last)}</div>` : '<div>未練習</div>'}
        </div>
      </div>
      ${tech.memo ? `<div class="log-memo">${tech.memo.substring(0,50)}${tech.memo.length > 50 ? '…' : ''}</div>` : ''}
      ${tech.videoUrl ? `<a class="tech-video-link" href="${tech.videoUrl}" target="_blank" onclick="event.stopPropagation()">▶ 動画を見る</a>` : ''}
    </div>`;
  }).join('');
}

function setTechFilter(f) { techFilter = f; renderTechs(); }

function renderMaster() {
  const container = document.getElementById('class-list');
  if (state.classes.length === 0) {
    container.innerHTML = '<p style="color:var(--muted);font-size:13px;padding:8px 0;">クラスが登録されていません</p>';
    return;
  }
  container.innerHTML = state.classes.map(c => `
    <div class="class-chip-row">
      <span style="font-size:14px;">${c}</span>
      <button class="btn btn-danger btn-sm" onclick="deleteClass('${c}')">削除</button>
    </div>
  `).join('');
}

// ── View detail ───────────────────────────────────────────────────
function viewLog(id) {
  const log = state.logs.find(l => l.id === id);
  if (!log) return;
  const techNames = (log.techniques || []).map(id => {
    const t = state.techniques.find(t => t.id === id);
    if (!t) return '';
    const cat = CATEGORIES[t.category] || CATEGORIES.other;
    return `<span class="belt-badge ${cat.cls}">${t.name}</span>`;
  }).join('');

  document.getElementById('view-log-content').innerHTML = `
    <div class="modal-title">${formatDate(log.date)}</div>
    ${log.className ? `<p style="color:var(--muted);font-size:13px;margin-bottom:14px;">${log.className}　${log.duration ? log.duration + '分' : ''}</p>` : ''}
    ${log.duration && !log.classname ? `<p style="color:var(--muted);font-size:13px;margin-bottom:14px;">${log.duration}分</p>` : ''}
    ${techNames ? `<div><p class="form-label">習った技</p><div class="log-techniques" style="margin-bottom:14px;">${techNames}</div></div>` : ''}
    ${log.sparring ? `<div><p class="form-label">スパーリング</p><p style="font-size:14px;margin-bottom:14px;">${log.sparring}</p></div>` : ''}
    ${log.memo ? `<div><p class="form-label">メモ</p><p style="font-size:14px;line-height:1.7;margin-bottom:14px;">${log.memo}</p></div>` : ''}
    <button class="btn btn-danger" style="width:100%;margin-top:8px;" onclick="deleteLog(${log.id})">この記録を削除</button>
    <button class="btn btn-ghost" style="width:100%;margin-top:8px;" onclick="closeModal('modal-view-log')">閉じる</button>
  `;
  openModal('modal-view-log');
}

function viewTech(id) {
  const tech = state.techniques.find(t => t.id === id);
  if (!tech) return;
  const cat = CATEGORIES[tech.category] || CATEGORIES.other;
  const last = lastPracticed(tech.id);
  const count = practiceCount(tech.id);
  const vidId = getYouTubeId(tech.videoUrl);
  const stale = last ? daysSince(last) > 14 : false;

  document.getElementById('view-tech-content').innerHTML = `
    <div class="modal-title">${tech.name} ${stale ? '<span class="stale-badge">復習しよう</span>' : ''}</div>
    <div style="margin-bottom:14px;"><span class="belt-badge ${cat.cls}">${cat.label}</span></div>
    <div style="display:flex;gap:20px;margin-bottom:14px;">
      <div><p class="form-label">練習回数</p><p style="font-size:18px;font-weight:700;color:var(--gold);">${count}<span style="font-size:12px;color:var(--muted);"> 回</span></p></div>
      <div><p class="form-label">最終練習</p><p style="font-size:13px;">${last ? formatDate(last) : '未練習'}</p></div>
    </div>
    ${tech.memo ? `<div><p class="form-label">メモ</p><p style="font-size:14px;line-height:1.7;margin-bottom:14px;">${tech.memo}</p></div>` : ''}
    ${vidId ? `<div><p class="form-label">参考動画</p><div class="video-container"><iframe src="https://www.youtube.com/embed/${vidId}" allowfullscreen></iframe></div></div>` : tech.videoUrl ? `<a class="tech-video-link" href="${tech.videoUrl}" target="_blank">▶ 動画を見る</a>` : ''}
    <button class="btn btn-danger" style="width:100%;margin-top:18px;" onclick="deleteTech(${tech.id})">この技を削除</button>
    <button class="btn btn-ghost" style="width:100%;margin-top:8px;" onclick="closeModal('modal-view-tech')">閉じる</button>
  `;
  openModal('modal-view-tech');
}

function deleteLog(id) {
  if (!confirm('この記録を削除しますか？')) return;
  state.logs = state.logs.filter(l => l.id !== id);
  save();
  closeModal('modal-view-log');
  render();
}

function deleteTech(id) {
  if (!confirm('この技を削除しますか？')) return;
  state.techniques = state.techniques.filter(t => t.id !== id);
  save();
  closeModal('modal-view-tech');
  render();
}

// ── Init ──────────────────────────────────────────────────────────
load();
showPage('log');
</script>
</body>
</html>
